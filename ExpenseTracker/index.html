<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Tracker</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
    body {
        background: #f5f7fa;
    }

    .card {
        border-radius: 15px;
        transition: 0.3s;
    }

    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0px 8px 20px rgba(0,0,0,0.1);
    }

    .income {
        color: green;
        font-weight: bold;
    }

    .expense {
        color: red;
        font-weight: bold;
    }

    .btn-custom {
        transition: 0.3s;
    }

    .btn-custom:hover {
        transform: scale(1.05);
    }

    .list-group-item:hover {
        background: #f1f1f1;
        cursor: pointer;
    }
</style>
</head>

<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">💰 Expense Tracker</h2>

    <!-- Dashboard -->
    <div class="row text-center mb-4">
        <div class="col-md-4">
            <div class="card p-3">
                <h5>Balance</h5>
                <h3 id="balance">₹0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Income</h5>
                <h3 class="income" id="income">₹0</h3>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card p-3">
                <h5>Expense</h5>
                <h3 class="expense" id="expense">₹0</h3>
            </div>
        </div>
    </div>

    <!-- Add Transaction -->
    <div class="card p-4 mb-4">
        <h5>Add Transaction</h5>
        <form id="form">
            <input type="text" id="text" class="form-control mb-2" placeholder="Enter description" required>

            <input type="number" id="amount" class="form-control mb-2" placeholder="Enter amount (+ income, - expense)" required>

            <select id="category" class="form-control mb-2">
                <option>Food</option>
                <option>Travel</option>
                <option>Shopping</option>
                <option>Salary</option>
                <option>Entertainment</option>
                <option>Movie</option>
            </select>

            <button class="btn btn-primary w-100 btn-custom">Add</button>
        </form>
    </div>

    <!-- History -->
    <div class="card p-4">
        <h5>Transaction History</h5>
        <ul id="list" class="list-group"></ul>
    </div>

</div>

<script>
    const balance = document.getElementById("balance");
    const income = document.getElementById("income");
    const expense = document.getElementById("expense");
    const list = document.getElementById("list");
    const form = document.getElementById("form");

    let transactions = JSON.parse(localStorage.getItem("transactions")) || [];

    function updateUI() {
        list.innerHTML = "";

        let total = 0, inc = 0, exp = 0;

        transactions.forEach((t, index) => {
            const li = document.createElement("li");
            li.className = "list-group-item d-flex justify-content-between align-items-center";

            li.innerHTML = `
                ${t.text} (${t.category})
                <span class="${t.amount > 0 ? 'income' : 'expense'}">
                    ₹${t.amount}
                </span>
                <button class="btn btn-sm btn-danger" onclick="deleteTransaction(${index})">X</button>
            `;

            list.appendChild(li);

            total += t.amount;
            if (t.amount > 0) inc += t.amount;
            else exp += t.amount;
        });

        balance.innerText = `₹${total}`;
        income.innerText = `₹${inc}`;
        expense.innerText = `₹${Math.abs(exp)}`;

        localStorage.setItem("transactions", JSON.stringify(transactions));
    }

    form.addEventListener("submit", function(e) {
        e.preventDefault();

        const text = document.getElementById("text").value;
        const amount = +document.getElementById("amount").value;
        const category = document.getElementById("category").value;

        transactions.push({ text, amount, category });

        form.reset();
        updateUI();
    });

    function deleteTransaction(index) {
        transactions.splice(index, 1);
        updateUI();
    }

    updateUI();
</script>

</body>
</html>
